<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        * { font-family: 'Segoe UI', Tahoma, sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #1e1e2f; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-box { background: #2d2d44; padding: 40px; border-radius: 30px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        .login-box h2 { color: #f8c291; margin-bottom: 20px; font-size: 28px; }
        .login-box input { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #1e1e2f; color: #fff; font-size: 16px; margin-bottom: 12px; outline: none; }
        .login-box input:focus { outline: 2px solid #f8c291; }
        .login-box button { background: #f8c291; color: #1e1e2f; border: none; padding: 14px; border-radius: 60px; font-weight: bold; font-size: 18px; cursor: pointer; width: 100%; }
        .login-box button:active { transform: scale(0.95); }
        .login-box .error { color: #e74c3c; margin-top: 12px; display: none; }
        .login-box .hint { color: #aaa; font-size: 14px; margin-top: 16px; }
        .login-box .hint strong { color: #f8c291; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 تسجيل الدخول</h2>
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" autocomplete="email">
        <input type="password" id="loginPassword" placeholder="كلمة المرور" autocomplete="current-password">
        <button onclick="login()">🚪 دخول</button>
        <div class="error" id="loginError"></div>
        <div class="hint">
            <strong>💡 للمطور:</strong> استخدم أي حساب مسجل في النظام.<br>
            مثال: <strong>admin@system.com</strong> / <strong>123456</strong>
        </div>
    </div>

    <script>
        const firebaseConfig = {
             apiKey: "AIzaSyAGZOWwJ9x808g0MjWUGTKGcSToBhh9jl0",
  authDomain: "rased-system-9a9ca.firebaseapp.com",
  databaseURL: "https://rased-system-9a9ca-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rased-system-9a9ca",
  storageBucket: "rased-system-9a9ca.firebasestorage.app",
  messagingSenderId: "198389972029",
  appId: "1:198389972029:web:e5dbf23a8bea6cd9e0fe54"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        window.login = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorDiv = document.getElementById('loginError');

            if (!email || !password) {
                errorDiv.textContent = '⚠️ أدخل البريد وكلمة المرور';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                await auth.signInWithEmailAndPassword(email, password);
                // إذا كان هناك رابط محفوظ (مثل admin.html?store=...)
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect') || 'admin.html';
                window.location.href = redirect;
            } catch (e) {
                errorDiv.textContent = '❌ ' + e.message;
                errorDiv.style.display = 'block';
            }
        };

        // إذا كان المستخدم مسجلاً بالفعل، حوله مباشرة
        auth.onAuthStateChanged((user) => {
            if (user) {
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect') || 'admin.html';
                window.location.href = redirect;
            }
        });
    </script>
</body>
</html>
